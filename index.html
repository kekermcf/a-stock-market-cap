<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Keke — A股 · H股 · 自选股</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#0f172a;color:#fff}
.header{text-align:center;padding:60px 24px 20px}
.header h1{font-size:36px;font-weight:800;letter-spacing:2px;margin-bottom:8px}
.header h1 span{background:linear-gradient(135deg,#60a5fa,#34d399,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:15px;color:#94a3b8;margin-top:8px}
.cards{flex:1;display:flex;justify-content:center;align-items:center;gap:28px;padding:40px 24px 80px;flex-wrap:wrap}
.card{width:320px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px 32px;text-decoration:none;color:#fff;transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:20px 20px 0 0}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,.3);border-color:rgba(255,255,255,.2)}
.card-a::before{background:linear-gradient(90deg,#4f46e5,#818cf8)}
.card-a:hover{background:rgba(79,70,229,.15)}
.card-a .card-icon{color:#818cf8}
.card-a .card-stat{color:#a5b4fc}
.card-h::before{background:linear-gradient(90deg,#0d9488,#2dd4bf)}
.card-h:hover{background:rgba(13,148,136,.15)}
.card-h .card-icon{color:#2dd4bf}
.card-h .card-stat{color:#5eead4}
.card-w::before{background:linear-gradient(90deg,#ea580c,#fb923c)}
.card-w:hover{background:rgba(234,88,12,.15)}
.card-w .card-icon{color:#fb923c}
.card-w .card-stat{color:#fdba74}
.card-icon{font-size:48px;margin-bottom:16px}
.card-title{font-size:24px;font-weight:700;margin-bottom:8px}
.card-desc{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:20px}
.card-stat{font-size:13px;font-weight:500;padding:6px 14px;background:rgba(255,255,255,.06);border-radius:20px;display:inline-block}
.card-arrow{position:absolute;bottom:20px;right:24px;font-size:20px;color:rgba(255,255,255,.3);transition:all .3s}
.card:hover .card-arrow{color:rgba(255,255,255,.7);transform:translateX(4px)}
.footer{text-align:center;padding:20px;font-size:12px;color:#475569}
/* Mobile */
@media(max-width:768px){
  .header{padding:40px 20px 12px}
  .header h1{font-size:28px}
  .cards{flex-direction:column;align-items:center;gap:16px;padding:24px 16px 60px}
  .card{width:100%;max-width:400px;padding:28px 24px}
  .card-icon{font-size:40px;margin-bottom:12px}
  .card-title{font-size:20px}
}
</style>
</head>
<body>
<div class="header">
  <h1><span>STOCK KEKE</span></h1>
  <div class="sub">港股市值超250亿 · A股市值超100亿 · 个人自选股</div>
</div>
<div class="cards">
  <a class="card card-a" href="ashare.html">
    <div class="card-icon">🇨🇳</div>
    <div class="card-title">A 股</div>
    <div class="card-desc">沪深交易所上市公司<br>市值 100 亿以上</div>
    <div class="card-stat">1800+ 只股票</div>
    <div class="card-arrow">→</div>
  </a>
  <a class="card card-h" href="hongkong.html">
    <div class="card-icon">🇭🇰</div>
    <div class="card-title">H 股</div>
    <div class="card-desc">香港交易所上市公司<br>市值 250 亿港币以上</div>
    <div class="card-stat">实时数据</div>
    <div class="card-arrow">→</div>
  </a>
  <a class="card card-w" href="watchlist.html">
    <div class="card-icon">⭐</div>
    <div class="card-title">自选股</div>
    <div class="card-desc">个人关注股票组合<br>A 股 + H 股自选</div>
    <div class="card-stat">我的 Watchlist</div>
    <div class="card-arrow">→</div>
  </a>
</div>
<div class="footer">Stock Keke · 数据仅供参考，不构成投资建议</div>
</body>
</html>
